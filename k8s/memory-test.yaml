apiVersion: v1
kind: Pod
metadata:
  name: cpu-test
  namespace: taskflow

spec:
  restartPolicy: Never

  containers:
  - name: cpu-test
    image: python:3.12-slim

    resources:
      requests:
        cpu: "100m"

      limits:
        cpu: "100m"

    command:
    - python
    - -c
    - |
      import time
      print('Burning CPU...')
      start = time.time()
      while time.time() - start < 30:
          pass  # busy loop
      print('Done')