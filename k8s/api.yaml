apiVersion: apps/v1
kind: Deployment
metadata:
  name: taskflow-api
  namespace: taskflow
spec:
  replicas: 2
  revisionHistoryLimit: 3
  strategy:
   type: RollingUpdate
   rollingUpdate:
    maxSurge: 1
    maxUnavailable: 0
  selector:
    matchLabels:
      app: taskflow-api
  template:
    metadata:
      labels:
        app: taskflow-api
    spec:
      tolerations:
      - key: "dedicated"
        operator: "Equal"
        value: "taskflow"
        effect: "NoSchedule"
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: disktype
                operator: In
                values:
                - ssd               # MUST run on SSD nodes
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 1
            preference:
              matchExpressions:
              - key: zone
                operator: In
                values:
                - us-east-1a 
      containers:
      - name: api
        image: taskflow-api:v4
        imagePullPolicy: Never
        ports:
        - containerPort: 8000
        startupProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 5
          failureThreshold: 12      # 12 x 5s = 60s max startup time
        readinessProbe:
          httpGet:
            path: /readyz
            port: 8000
          initialDelaySeconds: 0    # startup probe handles the delay now
          periodSeconds: 5
          failureThreshold: 3
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 0    # startup probe handles the delay now
          periodSeconds: 10
          failureThreshold: 3
        env:
        - name: DATABASE_URL
          value: "mysql+pymysql://taskflow:password@mysql-svc:3306/taskflow"
        - name: REDIS_HOST
          valueFrom:
            configMapKeyRef:
              name: taskflow-config
              key: REDIS_HOST
        - name: SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: taskflow-secret
              key: SECRET_KEY
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "500Mi"
            cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: taskflow-api-svc
  namespace: taskflow
spec:
  selector:
    app: taskflow-api
  ports:
  - port: 80
    targetPort: 8000
  type: NodePort